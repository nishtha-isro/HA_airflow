services:

  redis-primary:
    image: redis:7.0
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --requirepass redispassword

  redis-replica1:
    image: redis:7.0
    restart: always
    command: redis-server --replicaof redis-primary 6379 --requirepass redispassword --masterauth redispassword
    depends_on:
      - redis-primary

  redis-replica2:
    image: redis:7.0
    restart: always
    command: redis-server --replicaof redis-primary 6379 --requirepass redispassword --masterauth redispassword
    depends_on:
      - redis-primary

  redis-sentinel1:
    image: redis:7.0
    restart: always
    volumes:
      - ./redis-config/sentinel.conf:/etc/sentinel.conf
    command: redis-sentinel /etc/sentinel.conf
    depends_on:
      - redis-primary

  redis-sentinel2:
    image: redis:7.0
    restart: always
    volumes:
      - ./redis-config/sentinel.conf:/etc/sentinel.conf
    command: redis-sentinel /etc/sentinel.conf
    depends_on:
      - redis-primary

  redis-sentinel3:
    image: redis:7.0
    restart: always
    volumes:
      - ./redis-config/sentinel.conf:/etc/sentinel.conf
    command: redis-sentinel /etc/sentinel.conf
    depends_on:
      - redis-primary

  etcd1:
    image: quay.io/coreos/etcd:v3.5.12
    restart: always
    environment:
      - ETCD_NAME=etcd1
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd1:2379
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd1:2380
      - ETCD_ALLOW_NONE_AUTHENTICATION=yes

  etcd2:
    image: quay.io/coreos/etcd:v3.5.12
    restart: always
    environment:
      - ETCD_NAME=etcd2
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd2:2379
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd2:2380
      - ETCD_ALLOW_NONE_AUTHENTICATION=yes

  etcd3:
    image: quay.io/coreos/etcd:v3.5.12
    restart: always
    environment:
      - ETCD_NAME=etcd3
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd3:2379
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd3:2380
      - ETCD_ALLOW_NONE_AUTHENTICATION=yes

  fix-permissions:
    image: busybox
    user: root
    volumes:
      - pgdata1:/data1
      - pgdata2:/data2
      - pgdata3:/data3
      - pg-sockets:/run-postgresql
      - dags-volume:/git
    command: >
      sh -c "chown -R 1000:1000 /data1 /data2 /data3 /run-postgresql && chmod -R 777 /git"

  pg-node1:
    image: ongres/patroni:latest
    restart: always
    environment:
      PATRONI_NAME: pg-node1
      PATRONI_CONFIGURATION: |
        scope: airflow
        name: pg-node1
        log:
          level: INFO
        etcd3:
          hosts: etcd1:2379,etcd2:2379,etcd3:2379
        bootstrap:
          method: initdb
          dcs:
            ttl: 30
            loop_wait: 10
            retry_timeout: 10
            maximum_lag_on_failover: 1048576
            postgresql:
              use_pg_rewind: true
              use_slots: true
              parameters:
                wal_level: replica
                hot_standby: "on"
                max_wal_senders: 10
                max_replication_slots: 10
                max_connections: 100
                unix_socket_directories: "/tmp"
              pg_hba:
                - host replication replicator 0.0.0.0/0 md5
                - host all all 0.0.0.0/0 md5
                - local all all trust
        postgresql:
          listen: 0.0.0.0:5432
          connect_address: pg-node1:5432
          data_dir: /data/db
          bin_dir: /usr/lib/postgresql/17.2/bin
          pgpass: /tmp/pgpass
          authentication:
            replication:
              username: replicator
              password: replicatorpassword
            superuser:
              username: airflow
              password: airflow
        restapi:
          listen: 0.0.0.0:8008
          connect_address: pg-node1:8008
    depends_on:
      fix-permissions:
        condition: service_completed_successfully
    command: patroni
    volumes:
      - pgdata1:/data
      - pg-sockets:/run/postgresql

  pg-node2:
    image: ongres/patroni:latest
    restart: always
    environment:
      PATRONI_NAME: pg-node2
      PATRONI_CONFIGURATION: |
        scope: airflow
        name: pg-node2
        log:
          level: INFO
        etcd3:
          hosts: etcd1:2379,etcd2:2379,etcd3:2379
        bootstrap:
          method: initdb
          dcs:
            ttl: 30
            loop_wait: 10
            retry_timeout: 10
            maximum_lag_on_failover: 1048576
            postgresql:
              use_pg_rewind: true
              use_slots: true
              parameters:
                wal_level: replica
                hot_standby: "on"
                max_wal_senders: 10
                max_replication_slots: 10
                max_connections: 100
                unix_socket_directories: "/tmp"
              pg_hba:
                - host replication replicator 0.0.0.0/0 md5
                - host all all 0.0.0.0/0 md5
                - local all all trust
        postgresql:
          listen: 0.0.0.0:5432
          connect_address: pg-node2:5432
          data_dir: /data/db
          bin_dir: /usr/lib/postgresql/17.2/bin
          pgpass: /tmp/pgpass
          authentication:
            replication:
              username: replicator
              password: replicatorpassword
            superuser:
              username: airflow
              password: airflow
        restapi:
          listen: 0.0.0.0:8008
          connect_address: pg-node2:8008
    depends_on:
      fix-permissions:
        condition: service_completed_successfully
    command: patroni
    volumes:
      - pgdata2:/data
      - pg-sockets:/run/postgresql

  pg-node3:
    image: ongres/patroni:latest
    restart: always
    environment:
      PATRONI_NAME: pg-node3
      PATRONI_CONFIGURATION: |
        scope: airflow
        name: pg-node3
        log:
          level: INFO
        etcd3:
          hosts: etcd1:2379,etcd2:2379,etcd3:2379
        bootstrap:
          method: initdb
          dcs:
            ttl: 30
            loop_wait: 10
            retry_timeout: 10
            maximum_lag_on_failover: 1048576
            postgresql:
              use_pg_rewind: true
              use_slots: true
              parameters:
                wal_level: replica
                hot_standby: "on"
                max_wal_senders: 10
                max_replication_slots: 10
                max_connections: 100
                unix_socket_directories: "/tmp"
              pg_hba:
                - host replication replicator 0.0.0.0/0 md5
                - host all all 0.0.0.0/0 md5
                - local all all trust
        postgresql:
          listen: 0.0.0.0:5432
          connect_address: pg-node3:5432
          data_dir: /data/db
          bin_dir: /usr/lib/postgresql/17.2/bin
          pgpass: /tmp/pgpass
          authentication:
            replication:
              username: replicator
              password: replicatorpassword
            superuser:
              username: airflow
              password: airflow
        restapi:
          listen: 0.0.0.0:8008
          connect_address: pg-node3:8008
    depends_on:
      fix-permissions:
        condition: service_completed_successfully
    command: patroni
    volumes:
      - pgdata3:/data
      - pg-sockets:/run/postgresql

  haproxy:
    image: haproxy:latest
    restart: always
    ports:
      - '5432:5432' # DB port that Airflow connects to
      - '7000:7000' # HAProxy stats page
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - pg-node1
      - pg-node2
      - pg-node3

  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
    logging:
      options:
        max-size: 10m
        max-file: "3"

  webserver:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    restart: always
    depends_on:
      - haproxy
      - redis-sentinel1
    environment:
      - LOAD_EX=n
      - FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - EXECUTOR=Celery
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - REDIS_HOST=redis-sentinel1
      - REDIS_PORT=26379
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__BROKER_TRANSPORT_OPTIONS={"master_name":"mymaster","sentinel_kwargs":{"password":"redispassword"}}
      - AIRFLOW__WEBSERVER__WORKERS=2
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=120
      - AIRFLOW__WEBSERVER__SECRET_KEY=9a8b7c6d5e4f3g2h1i0j9k8l7m6n5o4p
    logging:
      options:
        max-size: 10m
        max-file: "3"
    volumes:
      - dags-volume:/opt/airflow/dags
      - ./config/airflow.cfg:/opt/airflow/airflow.cfg
    ports:
      - "8085:8080"
    command: >
      sh -c "until nc -z haproxy 5432; do echo 'Waiting for haproxy...'; sleep 2; done; airflow webserver"
    healthcheck:
      test: [ "CMD-SHELL", "[ -f /opt/airflow/airflow-webserver.pid ]" ]
      interval: 30s
      timeout: 30s
      retries: 3

  flower:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    restart: always
    depends_on:
      - redis-sentinel1
    environment:
      - EXECUTOR=Celery
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - REDIS_HOST=redis-sentinel1
      - REDIS_PORT=26379
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__BROKER_TRANSPORT_OPTIONS={"master_name":"mymaster","sentinel_kwargs":{"password":"redispassword"}}
    volumes:
      - ./config/airflow.cfg:/opt/airflow/airflow.cfg
    ports:
      - "5557:5555"
    command: >
      sh -c "until nc -z haproxy 5432; do echo 'Waiting for haproxy...'; sleep 2; done; airflow celery flower"

  scheduler:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    restart: always
    depends_on:
      - webserver
    volumes:
      - dags-volume:/opt/airflow/dags
      - ./config/airflow.cfg:/opt/airflow/airflow.cfg
    environment:
      - LOAD_EX=n
      - FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - EXECUTOR=Celery
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - REDIS_HOST=redis-sentinel1
      - REDIS_PORT=26379
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__BROKER_TRANSPORT_OPTIONS={"master_name":"mymaster","sentinel_kwargs":{"password":"redispassword"}}
    command: >
      sh -c "until nc -z haproxy 5432; do echo 'Waiting for haproxy...'; sleep 2; done; airflow scheduler"

  scheduler2:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    restart: always
    depends_on:
      - webserver
    volumes:
      - dags-volume:/opt/airflow/dags
      - ./config/airflow.cfg:/opt/airflow/airflow.cfg
    environment:
      - LOAD_EX=n
      - FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - EXECUTOR=Celery
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - REDIS_HOST=redis-sentinel1
      - REDIS_PORT=26379
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__BROKER_TRANSPORT_OPTIONS={"master_name":"mymaster","sentinel_kwargs":{"password":"redispassword"}}
    command: >
      sh -c "until nc -z haproxy 5432; do echo 'Waiting for haproxy...'; sleep 2; done; airflow scheduler"

  worker:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    restart: always
    depends_on:
      - scheduler
    volumes:
      - dags-volume:/opt/airflow/dags
      - ./config/airflow.cfg:/opt/airflow/airflow.cfg
    environment:
      - FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - EXECUTOR=Celery
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - REDIS_HOST=redis-sentinel1
      - REDIS_PORT=26379
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__BROKER_TRANSPORT_OPTIONS={"master_name":"mymaster","sentinel_kwargs":{"password":"redispassword"}}
    command: >
      sh -c "until nc -z haproxy 5432; do echo 'Waiting for haproxy...'; sleep 2; done; airflow celery worker"

  worker2:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    restart: always
    depends_on:
      - scheduler
    volumes:
      - dags-volume:/opt/airflow/dags
      - ./config/airflow.cfg:/opt/airflow/airflow.cfg
    environment:
      - FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - EXECUTOR=Celery
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - REDIS_HOST=redis-sentinel1
      - REDIS_PORT=26379
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__BROKER_TRANSPORT_OPTIONS={"master_name":"mymaster","sentinel_kwargs":{"password":"redispassword"}}
      - AIRFLOW__CELERY__WORKER_CONCURRENCY=4
    command: >
      sh -c "until nc -z haproxy 5432; do echo 'Waiting for haproxy...'; sleep 2; done; airflow celery worker"

  worker3:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    restart: always
    depends_on:
      - scheduler
    volumes:
      - dags-volume:/opt/airflow/dags
      - ./config/airflow.cfg:/opt/airflow/airflow.cfg
    environment:
      - FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - EXECUTOR=Celery
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - REDIS_HOST=redis-sentinel1
      - REDIS_PORT=26379
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@haproxy/airflow
      - AIRFLOW__CELERY__BROKER_TRANSPORT_OPTIONS={"master_name":"mymaster","sentinel_kwargs":{"password":"redispassword"}}
      - AIRFLOW__CELERY__WORKER_CONCURRENCY=4
    command: >
      sh -c "until nc -z haproxy 5432; do echo 'Waiting for haproxy...'; sleep 2; done; airflow celery worker"

  minio:
    image: minio/minio:latest
    restart: always
    ports:
      - '9000:9000' # S3 API port
      - '9001:9001' # MinIO Web Console port
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live' ]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO bucket auto-creator (runs once at startup)
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " sleep 5; mc alias set local http://minio:9000 minioadmin minioadmin123; mc mb local/airflow-logs --ignore-existing; mc anonymous set download local/airflow-logs; echo 'MinIO bucket created'; "

  git-sync:
    image: registry.k8s.io/git-sync/git-sync:v4.2.1
    restart: always
    environment:
      - GITSYNC_REPO=https://github.com/nishtha-isro/my-airflow-dags.git
      - GITSYNC_BRANCH=main
      - GITSYNC_PERIOD=30s
      - GITSYNC_ROOT=/git
      - GITSYNC_DEST=dags
    volumes:
      - dags-volume:/git

  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana

  redis-exporter:
    image: oliver006/redis_exporter:latest
    restart: always
    environment:
      - REDIS_ADDR=redis://redis-primary:6379
      - REDIS_PASSWORD=redispassword
    ports:
      - '9121:9121'

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: always
    environment:
      - DATA_SOURCE_NAME=postgresql://airflow:airflow@haproxy/airflow?sslmode=disable
    ports:
      - '9187:9187'

volumes:
  dags-volume:
  grafana-data:
  minio-data:
  pgdata1:
  pgdata2:
  pgdata3:
  pg-sockets:
