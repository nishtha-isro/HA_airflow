# Sentinel configuration file
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
# Tell sentinel to monitor Redis primary at this address
sentinel monitor mymaster redis-primary 6379 2
sentinel auth-pass mymaster redispassword
# 'mymaster' = name of this cluster
# 'redis-primary' = hostname of primary Redis
# '6379' = port
# '2' = quorum (2 of 3 sentinels must agree before failover)

# How long (ms) before sentinel considers primary dead
sentinel down-after-milliseconds mymaster 5000

# How long (ms) to wait for failover to complete
sentinel failover-timeout mymaster 10000

# How many replicas can sync with new primary at once
sentinel parallel-syncs mymaster 1
